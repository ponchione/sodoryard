services:
  yard:
    build:
      context: .
      dockerfile: Dockerfile
    image: ponchione/yard:dev
    networks:
      - llm-net
    volumes:
      - ${PROJECT_DIR:-./}:/project
    environment:
      - YARD_PROJECT=/project
      - SODORYARD_AGENTS_DIR=/opt/yard/agents

networks:
  llm-net:
    external: true
