services:
  yard:
    build:
      context: .
      dockerfile: Dockerfile
    image: ponchione/yard:dev
    networks:
      - llm-net
    volumes:
      - ${PROJECT_DIR:-./}:/project
    environment:
      - YARD_PROJECT=/project
      - SODORYARD_AGENTS_DIR=/opt/yard/agents

  knapford:
    image: ponchione/yard:dev
    command: ["knapford"]
    networks:
      - llm-net
    volumes:
      - ${PROJECT_DIR:-./}:/project
    ports:
      - "8080:8080"
    environment:
      - YARD_PROJECT=/project
    profiles:
      - knapford

networks:
  llm-net:
    external: true
